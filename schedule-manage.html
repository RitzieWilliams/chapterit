<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChapterIt — Manage Schedule</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dash-body">

  <!-- ─── NAV ─────────────────────────────────────────── -->
  <nav class="dash-nav">
    <button class="dash-hamburger" id="dash-hamburger" aria-label="Open menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <a href="dashboard.html" class="nav-logo">
      <img src="assets/logo.svg" alt="ChapterIt" class="logo-img">
    </a>
    <div class="dash-nav-links">
      <a href="dashboard.html" class="dash-nav-link">Chapters</a>
      <a href="teams.html" class="dash-nav-link">Teams</a>
      <a href="frame.html" class="dash-nav-link">Frame</a>
    </div>
    <div class="dash-nav-right">
      <button class="dash-icon-btn" aria-label="Notifications">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="dash-badge">0</span>
      </button>
      <button class="dash-avatar-btn" aria-label="Account" onclick="window.location='profile.html'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- ─── MOBILE DRAWER ────────────────────────────────── -->
  <div class="dash-drawer" id="dash-drawer" aria-hidden="true">
    <div class="dash-drawer-header">
      <button class="dash-drawer-close" id="dash-drawer-close" aria-label="Close menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <nav class="dash-drawer-nav">
      <a href="dashboard.html" class="dash-drawer-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3h7v7H3z"/><path d="M14 3h7v7h-7z"/><path d="M3 14h7v7H3z"/><path d="M14 14h7v7h-7z"/>
        </svg>
        Chapters
      </a>
      <a href="teams.html" class="dash-drawer-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Teams
      </a>
      <a href="frame.html" class="dash-drawer-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
        Frame
      </a>
      <a href="profile.html" class="dash-drawer-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Profile
      </a>
    </nav>
  </div>
  <div class="dash-drawer-overlay" id="dash-drawer-overlay"></div>

  <!-- ─── MAIN ─────────────────────────────────────────── -->
  <main class="dash-main">

    <div class="chapter-header">
      <a href="chapter.html" class="chapter-breadcrumb">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M11 6l-6 6 6 6"/>
        </svg>
        Junior Season 2024
      </a>
      <h1 class="chapter-detail-name">Manage<br>Schedule</h1>
      <div class="chapter-actions">
        <button class="btn-page-ghost" onclick="window.location='chapter.html'">Discard</button>
        <button class="btn-dash-primary" onclick="saveSchedule()">Save Changes</button>
      </div>
    </div>

    <!-- ── SCHEDULE EDITOR ───────────────────────────── -->
    <div class="sched-editor">

      <!-- Header row -->
      <div class="sched-header">
        <span class="sched-col-date">Date</span>
        <span class="sched-col-title">Event Title</span>
        <span class="sched-col-opp">Opponent</span>
        <span class="sched-col-score">Opp. Score</span>
        <span class="sched-col-score">Your Score</span>
        <span class="sched-col-del"></span>
      </div>

      <!-- Event rows -->
      <div class="sched-body" id="sched-body">

        <div class="sched-row">
          <input type="date" class="sched-input" value="2024-10-05">
          <input type="text" class="sched-input" value="Season Opener" placeholder="Event title">
          <input type="text" class="sched-input" value="Riverside HS" placeholder="Opponent">
          <input type="number" class="sched-input sched-input--score" value="52" min="0" placeholder="—">
          <input type="number" class="sched-input sched-input--score" value="68" min="0" placeholder="—">
          <button class="sched-delete" onclick="deleteRow(this)" aria-label="Delete event">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="sched-row">
          <input type="date" class="sched-input" value="2024-10-12">
          <input type="text" class="sched-input" value="Away at Westside" placeholder="Event title">
          <input type="text" class="sched-input" value="Westside Prep" placeholder="Opponent">
          <input type="number" class="sched-input sched-input--score" value="61" min="0" placeholder="—">
          <input type="number" class="sched-input sched-input--score" value="44" min="0" placeholder="—">
          <button class="sched-delete" onclick="deleteRow(this)" aria-label="Delete event">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="sched-row">
          <input type="date" class="sched-input" value="2024-10-19">
          <input type="text" class="sched-input" value="Home vs. Eastview" placeholder="Event title">
          <input type="text" class="sched-input" value="Eastview HS" placeholder="Opponent">
          <input type="number" class="sched-input sched-input--score" value="55" min="0" placeholder="—">
          <input type="number" class="sched-input sched-input--score" value="73" min="0" placeholder="—">
          <button class="sched-delete" onclick="deleteRow(this)" aria-label="Delete event">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="sched-row">
          <input type="date" class="sched-input" value="2024-10-26">
          <input type="text" class="sched-input" value="Tournament – Round 1" placeholder="Event title">
          <input type="text" class="sched-input" value="Central HS" placeholder="Opponent">
          <input type="number" class="sched-input sched-input--score" value="50" min="0" placeholder="—">
          <input type="number" class="sched-input sched-input--score" value="58" min="0" placeholder="—">
          <button class="sched-delete" onclick="deleteRow(this)" aria-label="Delete event">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="sched-row">
          <input type="date" class="sched-input" value="2024-11-02">
          <input type="text" class="sched-input" value="Tournament – Semifinals" placeholder="Event title">
          <input type="text" class="sched-input" value="North Valley HS" placeholder="Opponent">
          <input type="number" class="sched-input sched-input--score" placeholder="—" min="0">
          <input type="number" class="sched-input sched-input--score" placeholder="—" min="0">
          <button class="sched-delete" onclick="deleteRow(this)" aria-label="Delete event">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

      </div>

      <!-- Add event row -->
      <div class="sched-add-row">
        <button class="sched-add-btn" onclick="addRow()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Event
        </button>
      </div>

    </div>

  </main>

  <script src="js/main.js"></script>
  <script>
    function deleteRow(btn) {
      const row = btn.closest('.sched-row');
      row.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
      row.style.opacity = '0';
      row.style.transform = 'translateX(8px)';
      setTimeout(() => row.remove(), 200);
    }

    function addRow() {
      const body = document.getElementById('sched-body');
      const row = document.createElement('div');
      row.className = 'sched-row sched-row--new';
      row.innerHTML = `
        <input type="date" class="sched-input">
        <input type="text" class="sched-input" placeholder="Event title">
        <input type="text" class="sched-input" placeholder="Opponent">
        <input type="number" class="sched-input sched-input--score" placeholder="—" min="0">
        <input type="number" class="sched-input sched-input--score" placeholder="—" min="0">
        <button class="sched-delete" onclick="deleteRow(this)" aria-label="Delete event">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>`;
      body.appendChild(row);
      requestAnimationFrame(() => row.classList.remove('sched-row--new'));
      row.querySelector('input[type="date"]').focus();
    }

    function saveSchedule() {
      window.location = 'chapter.html';
    }
  </script>
</body>
</html>
