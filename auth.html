<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChapterIt — Get Started</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- AUTH NAV -->
  <nav class="auth-nav">
    <a href="index.html" class="nav-logo">
      <img src="assets/logo.svg" alt="ChapterIt" class="logo-img">
    </a>
  </nav>

  <div class="auth-page">

    <!-- LEFT PANEL -->
    <div class="auth-left">
      <div class="auth-left-bg"></div>
      <div class="auth-left-content">
        <h2 class="auth-left-headline">
          Every<br>
          moment<br>
          <span class="outline">deserves</span>
          <span class="outline">a chapter.</span>
        </h2>
        <p class="auth-left-tagline">
          Join ChapterIt and start building a collection of memories that actually tells your story.
        </p>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="auth-right">
      <div class="auth-form-wrap">

        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="signup">Create Account</button>
          <button class="auth-tab" data-tab="signin">Log In</button>
        </div>

        <!-- SIGN UP PANEL -->
        <div class="auth-panel active" id="panel-signup">
          <form id="form-signup" novalidate>

            <div class="form-group">
              <label for="signup-name">Full Name</label>
              <input type="text" id="signup-name" placeholder="Jane Smith" autocomplete="name" required>
            </div>

            <div class="form-group">
              <label for="signup-email">Email</label>
              <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" required>
            </div>

            <div class="form-group">
              <label for="signup-age">Your Age</label>
              <input type="number" id="signup-age" placeholder="Age" min="1" max="120" required>
            </div>

            <div class="form-group">
              <label for="signup-password">Password</label>
              <input type="password" id="signup-password" placeholder="Min. 8 characters" autocomplete="new-password" required minlength="8">
            </div>

            <button type="submit" class="btn-form" onclick="window.location='dashboard.html'">Create Account</button>

          </form>

          <div class="auth-divider"><span>or</span></div>

          <button class="btn-social" type="button">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
              <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </button>

          <p class="auth-switch">
            Already have an account? <a id="goto-signin">Log in</a>
          </p>
        </div>

        <!-- SIGN IN PANEL -->
        <div class="auth-panel" id="panel-signin">
          <form id="form-signin" novalidate>

            <div class="form-group">
              <label for="signin-email">Email</label>
              <input type="email" id="signin-email" placeholder="you@example.com" autocomplete="email" required>
            </div>

            <div class="form-group">
              <label for="signin-password">Password</label>
              <input type="password" id="signin-password" placeholder="Your password" autocomplete="current-password" required>
            </div>

            <a href="#" class="form-forgot">Forgot password?</a>

            <button type="submit" class="btn-form" onclick="window.location='dashboard.html'">Log In</button>

          </form>

          <div class="auth-divider"><span>or</span></div>

          <button class="btn-social" type="button">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
              <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </button>

          <p class="auth-switch">
            Don't have an account? <a id="goto-signup">Get started</a>
          </p>
        </div>

      </div>
    </div>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
