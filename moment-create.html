<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChapterIt — Add a Moment</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dash-body">

  <!-- ─── NAV ─────────────────────────────────────────── -->
  <nav class="dash-nav">
    <button class="dash-hamburger" id="dash-hamburger" aria-label="Open menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <a href="dashboard.html" class="nav-logo">
      <img src="assets/logo.svg" alt="ChapterIt" class="logo-img">
    </a>
    <div class="dash-nav-right">
      <button class="dash-icon-btn" aria-label="Notifications">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="dash-badge">0</span>
      </button>
      <button class="dash-avatar-btn" aria-label="Account" onclick="window.location='profile.html'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
      <button class="btn-dash-primary">Add New</button>
      <button class="dash-icon-btn dash-add-mobile" aria-label="Add New">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- ─── MOBILE DRAWER ────────────────────────────────── -->
  <div class="dash-drawer" id="dash-drawer" aria-hidden="true">
    <div class="dash-drawer-header">
      <button class="dash-drawer-close" id="dash-drawer-close" aria-label="Close menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <nav class="dash-drawer-nav">
      <a href="profile.html" class="dash-drawer-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        Profile
      </a>
    </nav>
  </div>
  <div class="dash-drawer-overlay" id="dash-drawer-overlay"></div>

  <!-- ─── MOMENT CREATE LAYOUT ─────────────────────────── -->
  <div class="create-layout moment-create-layout">

    <!-- ── LEFT: FORM ──────────────────────────────────── -->
    <div class="create-form-panel">

      <a href="javascript:history.back()" class="chapter-breadcrumb" style="margin-bottom: 32px; display: inline-flex;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M11 6l-6 6 6 6"/>
        </svg>
        Back
      </a>

      <h1 class="create-title">Add a<br>Moment</h1>

      <form id="moment-form" onsubmit="submitMoment(event)">

        <!-- Photo upload (required, mobile-only — desktop shows right panel) -->
        <div class="create-field-group moment-upload-mobile">
          <label class="create-label">Photo <span class="create-required">*</span></label>
          <div class="moment-upload-zone moment-upload-zone--compact" id="upload-zone-mobile">
            <input type="file" id="photo-input-mobile" accept="image/*" style="display:none">
            <div class="moment-upload-empty" id="upload-empty-mobile">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
              <p>Tap to add photo</p>
            </div>
            <img class="moment-upload-preview-img" id="preview-mobile" src="" alt="" style="display:none">
          </div>
        </div>

        <!-- Date -->
        <div class="create-field-group">
          <label class="create-label" for="moment-date">Date <span class="create-required">*</span></label>
          <input type="date" id="moment-date" class="create-input" required>
        </div>

        <!-- Title -->
        <div class="create-field-group">
          <label class="create-label" for="moment-title">Title</label>
          <input type="text" id="moment-title" class="create-input" placeholder="e.g. Opening Tip-Off">
        </div>

        <!-- Caption -->
        <div class="create-field-group">
          <label class="create-label" for="moment-caption">Caption</label>
          <textarea id="moment-caption" class="create-input create-textarea" placeholder="What made this moment worth remembering?" rows="4"></textarea>
        </div>

        <button type="submit" class="btn-dash-primary create-submit">Save Moment</button>

      </form>
    </div>

    <!-- ── RIGHT: PHOTO UPLOAD ──────────────────────────── -->
    <div class="moment-upload-panel" id="upload-panel">
      <input type="file" id="photo-input" accept="image/*" style="display:none">

      <!-- Empty state -->
      <div class="moment-upload-zone" id="upload-zone">
        <div class="moment-upload-empty" id="upload-empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <p class="moment-upload-label">Drop a photo here</p>
          <p class="moment-upload-sub">or <button type="button" class="moment-upload-browse" id="browse-btn">browse files</button></p>
          <p class="moment-upload-hint">JPG, PNG, HEIC up to 50MB</p>
        </div>
      </div>

      <!-- Preview state -->
      <div class="moment-upload-preview" id="upload-preview" style="display:none">
        <img class="moment-upload-preview-img" id="preview-img" src="" alt="Preview">
        <button type="button" class="moment-upload-change" id="change-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          Change Photo
        </button>
      </div>
    </div>

  </div>

  <script src="js/main.js"></script>
  <script>
    // ── Desktop upload ─────────────────────────────────
    const photoInput  = document.getElementById('photo-input');
    const uploadZone  = document.getElementById('upload-zone');
    const uploadEmpty = document.getElementById('upload-empty');
    const uploadPrev  = document.getElementById('upload-preview');
    const previewImg  = document.getElementById('preview-img');
    const browseBtn   = document.getElementById('browse-btn');
    const changeBtn   = document.getElementById('change-btn');

    function showPreview(file) {
      if (!file || !file.type.startsWith('image/')) return;
      const url = URL.createObjectURL(file);
      previewImg.src = url;
      uploadZone.style.display  = 'none';
      uploadPrev.style.display  = 'flex';
    }

    browseBtn.addEventListener('click', () => photoInput.click());
    changeBtn.addEventListener('click', () => { photoInput.click(); });
    photoInput.addEventListener('change', () => { if (photoInput.files[0]) showPreview(photoInput.files[0]); });

    // Drag-and-drop
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('is-dragover'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('is-dragover'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('is-dragover');
      const file = e.dataTransfer.files[0];
      if (file) { photoInput.files = e.dataTransfer.files; showPreview(file); }
    });

    // ── Mobile upload ──────────────────────────────────
    const mobileInput = document.getElementById('photo-input-mobile');
    const mobileZone  = document.getElementById('upload-zone-mobile');
    const mobilePrev  = document.getElementById('preview-mobile');
    const mobileEmpty = document.getElementById('upload-empty-mobile');

    mobileZone.addEventListener('click', () => mobileInput.click());
    mobileInput.addEventListener('change', () => {
      const file = mobileInput.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      mobilePrev.src = url;
      mobilePrev.style.display = 'block';
      mobileEmpty.style.display = 'none';
    });

    // ── Submit ─────────────────────────────────────────
    function submitMoment(e) {
      e.preventDefault();
      window.history.back();
    }
  </script>
</body>
</html>
